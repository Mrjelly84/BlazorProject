        // Capture global JS errors and store them to localStorage for debugging

            try {
                var entry = { message: e.message, filename: e.filename, lineno: e.lineno, colno: e.colno, error: e.error && e.error.stack ? e.error.stack : (e.error ? e.error.toString() : null), time: new Date().toISOString() };

                var existing = localStorage.getItem(key);
                var arr = [];
                if (existing) {
                    try { arr = JSON.parse(existing) || []; } catch { arr = []; }
                }
                arr.push(entry);
                localStorage.setItem(key, JSON.stringify(arr));
            } catch (ex) { }
        });
        window.addEventListener('unhandledrejection', function (e) {
            try {
                var reason = e.reason || (e.detail && e.detail.reason) || '';
