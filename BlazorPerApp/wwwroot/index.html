<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorPerApp</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorPerApp.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        // Capture global JS errors and store them to localStorage for debugging
        window.addEventListener('error', function (e) {
            try {
                var entry = { message: e.message, filename: e.filename, lineno: e.lineno, colno: e.colno, error: e.error && e.error.stack ? e.error.stack : (e.error ? e.error.toString() : null), time: new Date().toISOString() };
                var key = 'blazorperapp_global_errors';
                var existing = localStorage.getItem(key);
                var arr = [];
                if (existing) {
                    try { arr = JSON.parse(existing) || []; } catch { arr = []; }
                }
                arr.push(entry);
                localStorage.setItem(key, JSON.stringify(arr));
            } catch (ex) { }
        });
        window.addEventListener('unhandledrejection', function (e) {
            try {
                var reason = e.reason || (e.detail && e.detail.reason) || '';
                var entry = { message: 'UnhandledRejection: ' + (reason.message || reason.toString ? (reason.message || reason.toString()) : String(reason)), filename: null, lineno: null, colno: null, error: reason && reason.stack ? reason.stack : null, time: new Date().toISOString() };
                var key = 'blazorperapp_global_errors';
                var existing = localStorage.getItem(key);
                var arr = [];
                if (existing) {
                    try { arr = JSON.parse(existing) || []; } catch { arr = []; }
                }
                arr.push(entry);
                localStorage.setItem(key, JSON.stringify(arr));
            } catch (ex) { }
        });
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
